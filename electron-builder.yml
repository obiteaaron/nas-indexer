appId: nas-indexer
productName: NAS Indexer
copyright: MIT License

# 入口文件
main: dist-electron/main.js

# 包含的文件
files:
  - dist/**/*
  - dist-electron/**/*
  - frontend/dist/**/*
  - profiles/**/*
  - config.default.json
  - games-config.default.json
  - node_modules/**/*
  - "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!**/node_modules/*/{test,__tests__,tests,powered-test,example,examples}"
  - "!**/node_modules/*.d.ts"
  - "!**/node_modules/.bin"
  - "!**/*.{iml,o,hprof,orig,pyc,pyo,rbc,swp,csproj,sln,xproj}"
  - "!.editorconfig"
  - "!**/._*"
  - "!**/{.DS_Store,.git,.hg,.svn,CVS,RCS,SCCS,__pycache__,thumbs.db,.gitignore,.gitattributes}"

# Windows 配置
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: electron/icons/icon.ico

# NSIS 安装配置
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  installerIcon: electron/icons/icon.ico
  uninstallerIcon: electron/icons/icon.ico
  installerHeaderIcon: electron/icons/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: NAS Indexer

# macOS 配置
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: electron/icons/icon.icns
  category: public.app-category.utilities
  hardenedRuntime: false
  gatekeeperAssess: false

# Linux 配置
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: electron/icons/icon.png
  category: Utility
  maintainer: nomadic
  synopsis: NAS 文件索引与管理工具
  description: 离线文件索引、搜索、预览、管理

# 输出目录
directories:
  output: release
  buildResources: electron/icons

# 压缩配置
compression: normal