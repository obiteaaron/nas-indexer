appId: nas-indexer
productName: NAS Indexer
copyright: MIT License

# 包含的文件（打包进 asar）
files:
  - dist/**/*
  - dist-electron/**/*
  - frontend/dist/**/*
  - node_modules/**/*
  - "!dist-release/**/*"
  - "!release/**/*"
  - "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!**/node_modules/*/{test,__tests__,tests,powered-test,example,examples}"
  - "!**/node_modules/*.d.ts"
  - "!**/node_modules/.bin"
  - "!**/*.{iml,o,hprof,orig,pyc,pyo,rbc,swp,csproj,sln,xproj}"
  - "!.editorconfig"
  - "!**/._*"
  - "!**/{.DS_Store,.git,.hg,.svn,CVS,RCS,SCCS,__pycache__,thumbs.db,.gitignore,.gitattributes}"

# 额外资源（不打包进 asar，放在 resources 目录）
extraResources:
  - from: electron/icons
    to: electron/icons
  - from: config.default.json
  - from: games-config.default.json

# Windows 配置
win:
  target:
    - target: nsis
      arch:
        - x64

# NSIS 安装配置
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: NAS Indexer

# macOS 配置
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.utilities
  hardenedRuntime: false
  gatekeeperAssess: false

# Linux 配置
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Utility
  maintainer: nomadic
  synopsis: NAS 文件索引与管理工具
  description: 离线文件索引、搜索、预览、管理

# 输出目录
directories:
  output: dist-release

# 压缩配置
compression: normal